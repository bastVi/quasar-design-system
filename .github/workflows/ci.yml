name: CI

# Public verification only: no deploy, publish, or secret-dependent steps.

on:
  pull_request:
  push:
    branches: [master, production]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package build, types, Sass, and pack dry-run
        run: |
          pnpm build
          pnpm typecheck
          npx sass src/css/index.scss /tmp/qds-ci.css
          npx sass src/css/index.layered.scss /tmp/qds-ci-layered.css
          npm pack --dry-run --json

      - run: pnpm gallery:build
      - run: pnpm stories:build

      - name: Install Playwright browser dependencies
        run: pnpm -C examples/gallery exec playwright install --with-deps chromium

      - run: pnpm gallery:test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/gallery/playwright-report/
          if-no-files-found: ignore
